site_name: Fitz LiveViews
site_description: Real-time server-rendered UI for Fitz. WebSocket diffing, zero JS build, Phoenix LiveView-inspired.
site_author: Martín Palopoli
site_url: https://thegreekman76.github.io/fitz-liveviews/

repo_url: https://github.com/Thegreekman76/fitz-liveviews
repo_name: Thegreekman76/fitz-liveviews
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guide:
      - HTML primitives: html.md
      - LiveViews: live.md
      - LiveComponents: components.md
      - UI components (catalog): ui-components.md
      - Deploy: deploy.md
  - Course:
      - Overview: course/index.md
      - C1 — Your first live component: course/c1-first-live-component.md
      - C2 — Events, payloads & forms: course/c2-events-payloads-forms.md
      - C3 — Composing UI: course/c3-composing-ui.md
  - Examples:
      - Counter (Phase 2): examples/counter.md
      - Chat (Phase 3a + 3b): examples/chat.md
      - Kanban (Phase 4 showcase): examples/kanban.md
      - Dashboard (Phase 4 showcase): examples/dashboard.md
      - Admin ABM (flagship): examples/admin.md
      - Component gallery: examples/gallery.md
  - Roadmap: https://github.com/Thegreekman76/fitz-liveviews/blob/main/ROADMAP.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - .
        - examples
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
