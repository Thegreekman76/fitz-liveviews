# Runs the library tests and verifies both bundled examples compile.
#
# Fitz itself is installed via `cargo install --git` from the language
# repo. The compiled binary is cached across runs so subsequent CI is
# fast (first run takes ~4 min for the cold build, ~30 sec after that).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: fitz test + examples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and Fitz binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/fitz
          key: cargo-fitz-${{ runner.os }}-v1

      - name: Install Fitz
        run: |
          if [ ! -f ~/.cargo/bin/fitz ]; then
            cargo install --git https://github.com/Thegreekman76/fitz
          fi
          fitz --version

      - name: Library tests
        run: fitz test

      - name: Verify counter example compiles
        working-directory: examples/counter
        run: fitz check

      - name: Verify chat example compiles
        working-directory: examples/chat
        run: fitz check
