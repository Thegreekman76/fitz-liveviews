<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256">
  <title>Fitz LiveViews</title>
  <desc>Rust-style gear with a compressed Fitz Roy silhouette and three
        Wi-Fi-style signal arcs broadcasting upward from the peak. Fitz
        LiveViews — real-time server-rendered UI for Fitz.</desc>

  <defs>
    <!-- Gear tooth. Same geometry as Fitz base logo for family cohesion. -->
    <rect id="tooth"
          x="116" y="8" width="24" height="32"
          rx="3" ry="3"
          fill="#CE412B"/>

    <!-- Circular clip: confines mountain + waves inside the hollow. -->
    <clipPath id="hueco-clip">
      <circle cx="128" cy="128" r="68"/>
    </clipPath>
  </defs>

  <!-- 12 gear teeth around center (128, 128), one every 30°. -->
  <g>
    <use href="#tooth" transform="rotate(0 128 128)"/>
    <use href="#tooth" transform="rotate(30 128 128)"/>
    <use href="#tooth" transform="rotate(60 128 128)"/>
    <use href="#tooth" transform="rotate(90 128 128)"/>
    <use href="#tooth" transform="rotate(120 128 128)"/>
    <use href="#tooth" transform="rotate(150 128 128)"/>
    <use href="#tooth" transform="rotate(180 128 128)"/>
    <use href="#tooth" transform="rotate(210 128 128)"/>
    <use href="#tooth" transform="rotate(240 128 128)"/>
    <use href="#tooth" transform="rotate(270 128 128)"/>
    <use href="#tooth" transform="rotate(300 128 128)"/>
    <use href="#tooth" transform="rotate(330 128 128)"/>
  </g>

  <!-- Gear body (covers inner half of teeth). -->
  <circle cx="128" cy="128" r="100" fill="#CE412B"/>

  <!-- Hollow (sky). -->
  <circle cx="128" cy="128" r="68" fill="#FFFFFF"/>

  <!-- Mountain + signal waves, clipped to the hollow. -->
  <g clip-path="url(#hueco-clip)">
    <!-- Signal waves emanating from the peak (Wi-Fi style semi-circles
         concentric at the peak, matching the circular arc geometry of
         the hollow). Radii 16, 32, 48 → three clean concentric bands. -->
    <path d="M 112 130 A 16 16 0 0 1 144 130"
          fill="none" stroke="#CE412B" stroke-width="4"
          stroke-linecap="round"/>
    <path d="M 96 130 A 32 32 0 0 1 160 130"
          fill="none" stroke="#CE412B" stroke-width="4"
          stroke-linecap="round"/>
    <path d="M 80 130 A 48 48 0 0 1 176 130"
          fill="none" stroke="#CE412B" stroke-width="4"
          stroke-linecap="round"/>

    <!-- Simplified Fitz Roy silhouette (compressed to the lower half). -->
    <path d="M 50 200
             L 92 160
             L 110 176
             L 128 130
             L 148 171
             L 168 147
             L 206 200
             Z"
          fill="#CE412B"/>
  </g>
</svg>
